server {
    listen 80;
    server_name burakergun.duckdns.org;

    # Tüm HTTP trafiğini HTTPS'e yönlendirir
    location / {
        return 301 https://$host$request_uri;
    }

    # SSL sertifikası doğrulama yolu (Certbot için)
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }
}

server {
    listen 443 ssl;
    server_name burakergun.duckdns.org;

    # SSL Sertifika Yolları
    ssl_certificate /etc/letsencrypt/live/burakergun.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/burakergun.duckdns.org/privkey.pem;

    # Güvenlik Ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Frontend: Sitenin kendisini (HTML/JS) sunan bölüm
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Backend: /api/ ile başlayan istekleri Python Flask'a gönderen bölüm
    location /api/ {
        proxy_pass http://backend:5000/; # Sondaki / işareti çok önemli!
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Zaman aşımı ayarları
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
